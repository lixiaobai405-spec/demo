services:
  backend:
    build: ./backend
    container_name: meitai-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app               # 热重载: 代码改动即时生效
      - ./knowledge:/knowledge        # 知识库 YAML
      - backend_data:/app/data       # SQLite 持久化
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=sqlite:////app/data/meitai_demo.db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: meitai-frontend
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app              # 热重载
      - /app/node_modules            # 排除宿主 node_modules
      - /app/.next                   # 排除构建缓存
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend

volumes:
  backend_data:
